features:
- name: Issue and Ticket Primitives
  description: Issue tracking APIs expose a core issue/ticket primitive with identifier,
    title, description, status, assignee, reporter, priority, and timestamps as the
    unit of work that flows through development and project workflows.
- name: Configurable Workflows and Transitions
  description: Trackers like Jira, Linear, and Azure DevOps model state machines on
    top of issues — open, in-progress, in-review, done — and expose transition APIs
    that move work between states with optional validations and side effects.
- name: Labels, Components, and Custom Fields
  description: Issue APIs let teams classify work using labels, tags, components,
    fix versions, epics, and arbitrary custom fields, which are first-class resources
    that can be created, listed, and assigned via the API.
- name: Comments and Activity Streams
  description: Issues accumulate conversation and history. Most trackers expose comments
    as a separate resource and provide an audit-style activity stream covering field
    changes, transitions, and attachments.
- name: Sprints, Boards, and Backlogs
  description: Agile-oriented APIs (Jira Agile, Linear, Shortcut, Azure Boards) expose
    sprints, iterations, kanban boards, and backlogs as objects you can query and
    mutate alongside the underlying issues.
- name: Webhooks and Event Subscriptions
  description: Issue trackers publish events (created, updated, transitioned, commented)
    over webhooks so external automations, chatops bots, CI systems, and AI agents
    can react to work-item changes in near real time.
- name: Search, JQL, and Saved Queries
  description: Trackers expose query languages or filter parameters (Jira's JQL, GitHub's
    search syntax, Linear's filter API) for finding issues by status, assignee, label,
    sprint, or arbitrary custom-field combinations.
- name: Attachments and Linked Resources
  description: Issues support file attachments and relationships to other issues (blocks,
    blocked-by, duplicates, relates-to) and to external artifacts like commits, pull
    requests, deploys, and design files.
use_cases:
- name: Engineering Issue Tracking
  description: Software teams use Jira, Linear, GitHub Issues, or GitLab Issues as
    the system of record for bugs, stories, and tasks, with API integrations into
    IDEs, CI/CD pipelines, and code review tools.
- name: Cross-Team Work Coordination
  description: Work-management platforms like Asana, ClickUp, Monday.com, and Wrike
    coordinate tasks across engineering, marketing, design, and operations, often
    syncing with developer trackers via API.
- name: Product Roadmap and Discovery
  description: Productboard, Shortcut, and Linear connect customer feedback and product
    opportunities to issues and roadmap items, exposing APIs for ingesting feedback
    and synchronizing with engineering work.
- name: ChatOps and Bot Automation
  description: Slack, Microsoft Teams, and Discord bots create, update, transition,
    and comment on issues using tracker APIs — turning chat messages into tickets
    and pushing status updates back into channels.
- name: AI Agent Triage and Routing
  description: AI agents use issue tracker APIs to classify incoming issues, suggest
    labels and assignees, summarize threads, draft replies, link related tickets,
    and propose status transitions for human review.
- name: Reporting, Dashboards, and Analytics
  description: BI tools and dashboards pull cycle time, throughput, lead time, and
    backlog metrics from issue tracker APIs to measure engineering productivity and
    project health.
- name: Internal Developer Portals
  description: Backstage, Compass, and other internal developer portals embed issue
    tracker data alongside services, deployments, and ownership so teams see open
    issues for the components they own.
integrations:
- name: Jira
  description: Atlassian's market-leading issue and project tracker for software teams,
    with a deep REST API covering issues, projects, sprints, JQL search, custom fields,
    and webhooks.
- name: Linear
  description: Modern, opinionated issue tracker for high-velocity software teams,
    with a first-class GraphQL API for issues, cycles, projects, and roadmaps.
- name: GitHub Issues
  description: Lightweight tracker built into GitHub repositories, accessible through
    the GitHub REST and GraphQL APIs alongside pull requests, commits, and Actions.
- name: GitLab Issues
  description: Issue tracker tightly integrated with GitLab repositories, CI/CD, and
    merge requests, exposed via the GitLab REST and GraphQL APIs.
- name: Asana
  description: Work-management platform with tasks, projects, sections, and custom
    fields, exposed via the Asana REST API and frequently used as a cross-functional
    issue tracker.
- name: ClickUp
  description: All-in-one work-management platform with tasks, lists, spaces, and
    views, accessible through the ClickUp REST API.
- name: Monday.com
  description: Visual work-management platform with boards, items, and columns, accessible
    through the Monday GraphQL API and widely used as a task and issue tracker.
- name: Azure DevOps
  description: Microsoft's developer platform whose Boards service provides work-item
    tracking (bugs, user stories, tasks, epics) via the Azure DevOps REST API.
